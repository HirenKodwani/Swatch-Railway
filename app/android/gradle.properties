org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false

# Disable configuration cache - fixes 'Cannot access output property compiledDirectory'
# crash in cloud_firestore/file_picker verifyReleaseResources tasks with AGP 8.x
org.gradle.configuration-cache=false
org.gradle.unsafe.configuration-cache=false

# Disable parallel build to avoid race conditions between plugin resource tasks
org.gradle.parallel=false

# Disable daemon - fixes Windows file locking on linked.apk between Gradle tasks
org.gradle.daemon=false

# Disable VFS watch - prevents Gradle from holding file handles on intermediates
org.gradle.vfs.watch=false
