name: crm_train
description: "Swachh Railway - CRM and Cleaning Management System for Indian Railways"

publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  pdf: ^3.11.3
  http: ^1.1.0
  http_parser: ^4.0.2
  shared_preferences: ^2.5.3
  provider: ^6.1.1
  buttons_tabbar: ^1.3.15
  persistent_bottom_nav_bar: ^6.2.1
  get: ^4.7.3
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  crypto: ^3.0.6
  fl_chart: ^1.1.1
  font_awesome_flutter: ^10.12.0
  google_fonts: ^6.3.2
  excel: ^4.0.6
  open_filex: ^4.7.0
  syncfusion_flutter_xlsio: ^29.2.11
  dropdown_search: ^6.0.2
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  geolocator: ^13.0.2
  image_picker: ^1.2.3
  printing: ^5.14.3
  share_plus: ^12.0.2
  cross_file: ^0.3.5+2
  file_picker: ^8.1.7
  signature: ^5.5.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2
  change_app_package_name: ^1.5.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/indian_railway.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/indian_railway.png"


